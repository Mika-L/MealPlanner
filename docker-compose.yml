services:
  mysql:
    image: mysql:8.4
    container_name: mealplanner-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mealplanner
    ports:
      - "3306:3306"
    volumes:
      - mealplanner-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mealplanner-mysql-data:
