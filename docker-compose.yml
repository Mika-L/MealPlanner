# SQL Server local pour le développement (l'API cible localhost,1433 via appsettings.json).
# En dev/prod Azure, la base est un Azure SQL Database serverless (voir infra/ + README).
# L'API crée la base « MealPlanner » et applique les migrations au démarrage.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64 # image amd64 : émulée sur Apple Silicon
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev_p4ssw0rd"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data:
