<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MealPlanner — Des idées de repas qui pétillent</title>
    <script>
      // Applique le thème enregistré avant le premier rendu (évite le flash de couleur).
      try {
        var t = localStorage.getItem('mealplanner-theme')
        document.documentElement.dataset.palette = t === 'coral' ? 'coral' : 'stone'
      } catch (e) {
        document.documentElement.dataset.palette = 'stone'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
